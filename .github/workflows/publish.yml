name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run cargo publish --dry-run instead of publishing
        required: true
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - uses: taiki-e/install-action@v2
        with:
          tool: typos-cli
      - uses: Swatinem/rust-cache@v2
      - name: Determine release tag
        if: !inputs.dry_run
        id: release_tag
        run: |
          tag="$(
            cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "clients") | .version'
          )"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo 'Could not determine version for package "clients" from cargo metadata; the package may be missing from the workspace' >&2
            exit 1
          fi
          echo "tag=v${tag}" >> "$GITHUB_OUTPUT"
      - name: Ensure release tag does not already exist
        if: !inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release_tag.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists" >&2
            exit 1
          fi
      - name: Dry run publish
        if: inputs.dry_run
        run: |
          just ci
          cargo publish -p clients-macros --dry-run
          cargo publish -p clients --dry-run
      - name: Publish crates
        if: !inputs.dry_run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: just publish
      - name: Create git tag and GitHub release
        if: !inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release_tag.outputs.tag }}"
          cleanup() {
            echo "Cleaning up tag ${tag} after release creation failure" >&2
            if git rev-parse "$tag" >/dev/null 2>&1 && ! git tag -d "$tag" >/dev/null 2>&1; then
              echo "Failed to delete local tag ${tag} during cleanup" >&2
            fi
            if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1 && ! git push origin ":refs/tags/$tag"; then
              echo "Failed to delete remote tag ${tag} during cleanup" >&2
            fi
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          trap cleanup ERR
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --verify-tag --generate-notes --title "$tag"
          trap - ERR
